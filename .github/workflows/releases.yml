name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.25.8"

jobs:
  release:
    name: Build and release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            execname: "ssv-dkg"
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            execname: "ssv-dkg"
          - os: macos-latest
            goos: darwin
            goarch: amd64
            execname: "ssv-dkg"
          - os: macos-latest
            goos: darwin
            goarch: arm64
            execname: "ssv-dkg"
          - os: windows-latest
            goos: windows
            goarch: amd64
            execname: "ssv-dkg.exe"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install ARM64 cross-compiler (Linux)
        if: runner.os == 'Linux' && matrix.goarch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install mingw

      - name: Create bin directory (Linux/macOS)
        if: runner.os != 'Windows'
        run: mkdir -p bin

      - name: Create bin directory (Windows)
        if: runner.os == 'Windows'
        run: New-Item -ItemType Directory -Force -Path bin

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
            export CXX=aarch64-linux-gnu-g++
          fi
          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -o ./bin/${{ matrix.execname }} \
            -ldflags "-X main.Version=${{ github.ref_name }}" \
            ./cmd/ssv-dkg/ssv-dkg.go

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -o ./bin/${{ matrix.execname }} \
            -ldflags "-X main.Version=${{ github.ref_name }}" \
            ./cmd/ssv-dkg/ssv-dkg.go

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:CGO_ENABLED="1"
          $env:GOOS="${{ matrix.goos }}"
          $env:GOARCH="${{ matrix.goarch }}"
          go build -o bin/${{ matrix.execname }} `
            -ldflags "-X main.Version=${{ github.ref_name }}" `
            ./cmd/ssv-dkg/ssv-dkg.go

      - name: Create ZIP (Linux/macOS)
        if: runner.os != 'Windows'
        run: zip -j ./bin/ssv-dkg-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip ./bin/${{ matrix.execname }}

      - name: Create ZIP (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path bin\${{ matrix.execname }} -DestinationPath bin\ssv-dkg-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: ./bin/ssv-dkg-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip
