stages:
  - build
  - deploy

variables:
  #GLOBAL
  IMAGE_NAME: ssv-dkg
  DOCKER_BUILDKIT: 1
  # Multi-architecture platforms
  DOCKER_PLATFORMS: "linux/amd64,linux/arm64"

  #PRODUCTION
  ACCOUNT_ID_INFRA_PROD: 764289642555
  AWS_REGION_INFRA_PROD: "us-west-2"
  DOCKER_REPO_INFRA_PROD: $ACCOUNT_ID_INFRA_PROD.dkr.ecr.$AWS_REGION_INFRA_PROD.amazonaws.com/$IMAGE_NAME
  APP_REPLICAS_INFRA_PROD: "1"
  ECRLOGIN_INFRA_PROD: "aws ecr get-login --registry-ids $ACCOUNT_ID_INFRA_PROD --region $AWS_REGION_INFRA_PROD --no-include-email"
  PROD_HEALTH_CHECK_IMAGE: 764289642555.dkr.ecr.us-west-2.amazonaws.com/infra-prod-repo:ubuntu20


# +---------------+
# |     Prod      |
# +---------------+
Build prod Docker image:
  image: docker:29-dind
  stage: build
  tags:
    - blox-infra-prod
  services:
    - docker:29-dind
  before_script:
    - apk add --no-cache py-pip aws-cli
    - pip install pyyaml==5.3.1
    # Setup buildx for multi-architecture builds
    - docker buildx create --name multiarch-builder --use --bootstrap || docker buildx use multiarch-builder
    # Login to ECR
    - aws ecr get-login-password --region $AWS_REGION_INFRA_PROD | docker login --username AWS --password-stdin $ACCOUNT_ID_INFRA_PROD.dkr.ecr.$AWS_REGION_INFRA_PROD.amazonaws.com
  script:
    # Build and push multi-architecture image
    - |
      docker buildx build \
        --platform $DOCKER_PLATFORMS \
        -t $DOCKER_REPO_INFRA_PROD:$CI_COMMIT_SHA \
        -t $DOCKER_REPO_INFRA_PROD:latest \
        --push \
        -f Dockerfile .
  only:
    - main

Deploy nodes to prod:
  stage: deploy
  tags:
    - blox-infra-prod
  script:
    - apk add bash curl
    - export K8S_API_VERSION=$INFRA_PROD_K8_API_VERSION
    - export SSV_DKG_CPU_LIMIT=$PROD_SSV_DKG_CPU_LIMIT
    - export SSV_DKG_MEM_LIMIT=$PROD_SSV_DKG_MEM_LIMIT
    - curl -LO https://storage.googleapis.com/kubernetes-release/release/v1.18.0/bin/linux/amd64/kubectl
    - chmod +x ./kubectl
    - mv ./kubectl /usr/bin/kubectl
    - mkdir ~/.kube/
    - echo $PROD_KUBECONFIG | base64 -d > kubeconfig
    - mv kubeconfig ~/.kube/
    - export KUBECONFIG=~/.kube/kubeconfig
    - kubectl config get-contexts
    # +-------------------------------+
    # |      Deploy ssv-dkg nodes     |
    # +-------------------------------+
    - .k8/production/ssv-dkg/scripts/deploy-ssv-dkg-1--4.sh $DOCKER_REPO_INFRA_PROD $CI_COMMIT_SHA ssv $APP_REPLICAS_INFRA_PROD blox-infra-prod kubernetes-admin@blox-infra-prod ssv.network $K8S_API_VERSION $SSV_DKG_CPU_LIMIT $SSV_DKG_MEM_LIMIT
  only:
    - main
